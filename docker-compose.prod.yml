version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: teams_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-teams_control}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - teams_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: teams_api_prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-teams_control}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FLASK_ENV: production
    depends_on:
      - db
    networks:
      - teams_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teams_frontend_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - teams_network

networks:
  teams_network:
    driver: bridge

volumes:
  postgres_data_prod:
